  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "homeState": "inactive",
      "accentColor": "#3dffcf",
      "glassIntensity": 20,
      "cardStyle": "glass",
      "fontFamily": "Inter"
    }/*EDITMODE-END*/;

    function MentexApp() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [tab, setTab] = React.useState('home');
      // editTimeCtx — context object para abrir el CustomTimeModal con
      // diferentes presets según el origen:
      //   null                              → modal cerrado
      //   {}                                → desde HomeInactive (defaults 1h 30m)
      //   { initialMinutes, elapsedMinutes, minMinutes } → desde HomeActive
      //     (con totalMin actual + elapsed para mostrar el sub "Llevas X min").
      // Único mount point del modal — no más instancias duplicadas en
      // HomeActive ni HomeInactive.
      const [editTimeCtx, setEditTimeCtx] = React.useState(null);
      const setModalOpen = (v) => setEditTimeCtx(v ? {} : null); // back-compat helper
      const [sessionStartedAt, setSessionStartedAt] = React.useState(0);
      // autoRoutineCtx — abre AutoRoutineCreateSheet con el setup actual
      // del HomeInactive (apps + rutinas + tiempo elegido). El user puede
      // editar cada sección via los editores existentes (apps, routines,
      // time) sin salir del flow — al volver, el setup tile se actualiza
      // automáticamente vía re-render porque lee del state global.
      const [autoRoutineCtx, setAutoRoutineCtx] = React.useState(null);
      // autoRoutineCreated — al confirmar la creación, en lugar de un toast
      // simple se abre AutoRoutineCreatedSheet con el resumen del objeto
      // recién persistido. null cuando no hay sheet abierto, sino el
      // routine object devuelto por __mtxAutoRoutines.add().
      const [autoRoutineCreated, setAutoRoutineCreated] = React.useState(null);
      const [view, setView] = React.useState('home'); // 'home' | 'challenges-all' | 'learning-all'
      const [selectedChallenge, setSelectedChallenge] = React.useState(null);
      const [selectedLearning, setSelectedLearning] = React.useState(null);
      const [challenges, setChallenges] = React.useState(() => CHALLENGES);
      const [learning, setLearning] = React.useState(() => LEARNING);
      const [routinesCatalog, setRoutinesCatalog] = React.useState(() => DEFAULT_ROUTINES);
      const [appsEditorOpen, setAppsEditorOpen] = React.useState(false);
      const [routinesEditorOpen, setRoutinesEditorOpen] = React.useState(false);
      const [notifsOpen, setNotifsOpen] = React.useState(false);

      // Phase 5.3 — Premium lock state. Cualquier consumer puede abrir el
      // sheet llamando window.__mtxOpenPremiumLock(feature). El feature
      // string mapea a un mensaje contextualizado en premium-gate.jsx
      // (apps, ia-chat, ia-quick, content, default).
      const [premiumLockFeature, setPremiumLockFeature] = React.useState(null);
      React.useEffect(() => {
        // Expone helper global al window para que cualquier consumer lo dispare
        // sin necesitar prop drilling. Pattern idéntico al de useToast.
        window.__mtxOpenPremiumLock = (feature) => setPremiumLockFeature(feature || 'default');
        return () => { try { delete window.__mtxOpenPremiumLock; } catch (_) {} };
      }, []);
      // settingsOpen — lifted al shell para que SettingsScreen renderice SOBRE
      // el tab bar (z=50). Mismo patrón que iaSettingsOpen/AssistantConfigSheet.
      const [settingsOpen, setSettingsOpen] = React.useState(false);
      React.useEffect(() => {
        window.__mtxOpenSettings  = () => setSettingsOpen(true);
        window.__mtxCloseSettings = () => setSettingsOpen(false);
        return () => {
          try { delete window.__mtxOpenSettings;  } catch (_) {}
          try { delete window.__mtxCloseSettings; } catch (_) {}
        };
      }, []);
      // inAppBrowserCtx — lifted al shell para que InAppBrowserSheet renderice SOBRE
      // el tab bar. Se abre via window.__mtxOpenInAppBrowser(url, socialId, label, handle).
      const [inAppBrowserCtx, setInAppBrowserCtx] = React.useState(null);
      React.useEffect(() => {
        window.__mtxOpenInAppBrowser = (url, socialId, socialLabel, handle) =>
          setInAppBrowserCtx({ url, socialId, socialLabel, handle });
        return () => { try { delete window.__mtxOpenInAppBrowser; } catch (_) {} };
      }, []);
      const [notifCount, setNotifCount] = React.useState(4);
      const [nowPlayingOpen, setNowPlayingOpen] = React.useState(false);
      // breakPickerOpen/breakActive/breakCount eliminados en Fase A — el descanso
      // ya no es un fullscreen; vive dentro de AppsProtectionCard del Home activo.
      const [reflectionOpen, setReflectionOpen] = React.useState(false);
      const [completionOpen, setCompletionOpen] = React.useState(false);
      // Sesión interrumpida abruptamente (vs completada por tiempo). Distinción
      // importante: completionOpen es celebración + compartir; interruptedOpen
      // es reflexión + invitación a re-comprometerse.
      const [interruptedOpen, setInterruptedOpen] = React.useState(false);
      const [interruptedStats, setInterruptedStats] = React.useState({ elapsedMin: 0 });
      const [userProfileId, setUserProfileId] = React.useState(null); // userId del perfil de otro usuario abierto
      // tabBarHidden — Reflejo del store global __mtxNav. Cada flow (Explorar,
      // Comunidad...) puede llamar window.__mtxNav.setInternal(section, bool)
      // cuando entra/sale de páginas internas. Aquí escuchamos los eventos y
      // ocultamos la tab bar cuando el tab actual está en una vista interna —
      // el menú con los 5 íconos estorba al user que ya navegó hacia adentro
      // y tiene su propio back button. Vuelve cuando el flow regresa a home.
      const [tabBarHidden, setTabBarHidden] = React.useState(false);
      // iaHistoryOpen — lifted del IAScreen para que el sheet renderice al
      // nivel del shell (sibling de mtx-bg, sibling de los demás sheets)
      // y aparezca SOBRE el tab bar (que vive en mtx-bg con z=50). Si el
      // sheet vive dentro del IA wrapper (z=2), queda detrás del tab bar.
      const [iaHistoryOpen, setIaHistoryOpen] = React.useState(false);
      // iaSettingsOpen — lifted al shell por la misma razón que history:
      // queremos que el sheet de configuración renderice SOBRE el tab bar
      // (vive en mtx-bg con z=50). Sibling de los demás sheets → z=100 root.
      const [iaSettingsOpen, setIaSettingsOpen] = React.useState(false);
      // iaAgendaOpen — Fase 4. Mismo patrón: bottom sheet con timeline del día,
      // propuestas del coach (CTAs accionables) y recordatorios. Disparado
      // desde el icon button 📅 del IAHubHeader.
      const [iaAgendaOpen, setIaAgendaOpen] = React.useState(false);
      const [state, setState] = React.useState(() => {
        // Phase 5.1 — Pre-populate desde __mtxOnboarding.answers si el user
        // es PREMIUM. Phase 5.3 — si el user es FREE, los apps llegan
        // todos OFF (no podemos pre-popularlos porque el bloqueo es premium).
        // Cuando active trial, puede prender los toggles desde el HomeInactive.
        // Lazy initializer: corre una sola vez al mount del MentexApp.
        const ob = (typeof window !== 'undefined' && window.__mtxOnboarding)
          ? window.__mtxOnboarding.get() : null;
        const ans = (ob && ob.answers) || {};
        const isPremium = (typeof window !== 'undefined' && window.__mtxIsPremium)
          ? window.__mtxIsPremium() : true;
        return {
          blockedApps: (isPremium && Array.isArray(ans.blockedApps)) ? ans.blockedApps : [],
          routines: [],
          time: 0,
        };
      });

      // Toggle join / leave from detail sheet
      const handleJoin = (id) => {
        setChallenges(cs => cs.map(c => c.id === id
          ? { ...c, status: c.status === 'available' ? 'joined' : c.status,
                  day: c.status === 'available' ? 1 : c.day }
          : c));
        setSelectedChallenge(prev => prev && prev.id === id
          ? { ...prev, status: prev.status === 'available' ? 'joined' : prev.status,
                       day: prev.status === 'available' ? 1 : prev.day }
          : prev);
      };
      const handleLeave = (id) => {
        setChallenges(cs => cs.map(c => c.id === id
          ? { ...c, status: 'available', day: 0 }
          : c));
        setSelectedChallenge(null);
      };

      // Learning handlers
      const handlePlayLearning = (id) => {
        setLearning(ls => ls.map(l => l.id === id ? { ...l, status: 'played' } : l));
        setSelectedLearning(prev => prev && prev.id === id ? { ...prev, status: 'played' } : prev);
      };
      const handleScheduleLearning = (id) => {
        setLearning(ls => ls.map(l => l.id === id
          ? { ...l, status: l.status === 'scheduled' ? 'new' : 'scheduled' }
          : l));
        setSelectedLearning(prev => prev && prev.id === id
          ? { ...prev, status: prev.status === 'scheduled' ? 'new' : 'scheduled' }
          : prev);
      };
      const handleSaveLearning = (id) => {
        setLearning(ls => ls.map(l => l.id === id
          ? { ...l, status: l.status === 'saved' ? 'new' : 'saved' }
          : l));
        setSelectedLearning(prev => prev && prev.id === id
          ? { ...prev, status: prev.status === 'saved' ? 'new' : 'saved' }
          : prev);
      };

      // Apply tweaks via CSS vars
      React.useEffect(() => {
        const root = document.documentElement;
        root.style.setProperty('--neon', tweaks.accentColor);
        // derive soft/deep
        root.style.setProperty('--ff-sans', `'${tweaks.fontFamily}', system-ui, sans-serif`);
        root.style.setProperty('--ff-display', `'${tweaks.fontFamily}', system-ui, sans-serif`);
      }, [tweaks.accentColor, tweaks.fontFamily]);

      // Listener: tap en item desde Comunidad/Perfil → cambia a Explorar y abre VideoSheet
      // Al cerrar el VideoSheet, vuelve al tab origen (community/profile)
      const prevTabRef = React.useRef(null);
      React.useEffect(() => {
        const openHandler = (e) => {
          const itemId = e.detail && e.detail.itemId;
          if (!itemId) return;
          // Solo recordamos si NO estamos ya en explore
          if (tab !== 'explore') prevTabRef.current = tab;
          setTab('explore');
          setTimeout(() => {
            window.dispatchEvent(new CustomEvent('mtx:explore-open-item', { detail: { itemId } }));
          }, 60);
        };
        const closeHandler = () => {
          if (prevTabRef.current && prevTabRef.current !== 'explore') {
            const back = prevTabRef.current;
            prevTabRef.current = null;
            setTab(back);
          }
        };
        window.addEventListener('mtx:open-item-from-community', openHandler);
        window.addEventListener('mtx:videosheet-closed', closeHandler);
        return () => {
          window.removeEventListener('mtx:open-item-from-community', openHandler);
          window.removeEventListener('mtx:videosheet-closed', closeHandler);
        };
      }, [tab]);

      // Listener: tap en avatar/nombre desde Comunidad/Thread → abre perfil de otro usuario
      React.useEffect(() => {
        const handler = (e) => {
          const userId = e.detail && e.detail.userId;
          if (!userId) return;
          setUserProfileId(userId);
        };
        window.addEventListener('mtx:open-user-profile', handler);
        return () => window.removeEventListener('mtx:open-user-profile', handler);
      }, []);

      // Listener: el user toca back en el chat de sesión activa (scope=
      // 'session-active' abierto desde HomeActive). Volver al tab home
      // preserva el contexto — el user solo consultó al coach mientras
      // estaba en sesión, no quería irse al hub del tab IA.
      React.useEffect(() => {
        const handler = () => setTab('home');
        window.addEventListener('mtx:ia-leave-session-chat', handler);
        return () => window.removeEventListener('mtx:ia-leave-session-chat', handler);
      }, []);

      // Listeners: Agenda → Reproductor / Ritual.
      // El AgendaItemDetailSheet dispara estos eventos al tappear "Iniciar ahora"
      // según el tipo de playable. Aquí los conectamos al estado del shell.
      React.useEffect(() => {
        const openPlayer = () => setNowPlayingOpen(true);
        const startRitual = () => {
          // Mock: solo log + toast. Backend real arrancaría el scheduler con
          // los apps + rutinas del state planeado.
          console.log('[mtx:start-ritual-session] solicitado desde Agenda');
        };
        window.addEventListener('mtx:open-player', openPlayer);
        window.addEventListener('mtx:start-ritual-session', startRitual);
        return () => {
          window.removeEventListener('mtx:open-player', openPlayer);
          window.removeEventListener('mtx:start-ritual-session', startRitual);
        };
      }, []);

      // Sub-fase 0.3 (Fase B/C) eliminó este listener obsoleto: antes el tap
      // en el mini-bar forzaba setTab('explore') para que ExploreScreen
      // pudiera montar el VideoPlayerFullscreen. Ahora el player es global
      // (GlobalPlayerOverlay vive a nivel del MentexApp) y captura
      // 'mtx:expand-player' directamente sin cambiar de tab. Mantenerlo
      // causaba el bug de "regreso a Explorar" al minimizar el fullscreen
      // desde el Home con sesión activa.

      // Suscripción al store del player vía evento directo (no usamos
      // window.useNowPlaying aquí porque su disponibilidad depende del orden
      // de carga de scripts — usar el listener directo es más robusto).
      const [nowPlayingItem, setNowPlayingItem] = React.useState(null);
      const [playerFullscreenOpen, setPlayerFullscreenOpen] = React.useState(false);
      React.useEffect(() => {
        // Hidratación inicial por si el store ya tenía estado al montar
        if (window.__mtxPlayer) {
          const s = window.__mtxPlayer.get();
          setNowPlayingItem(s.currentItem);
          setPlayerFullscreenOpen(!!s.fullscreenOpen);
        }
        const handler = (e) => {
          setNowPlayingItem(e.detail?.currentItem || null);
          setPlayerFullscreenOpen(!!e.detail?.fullscreenOpen);
        };
        window.addEventListener('mtx:player-changed', handler);
        return () => window.removeEventListener('mtx:player-changed', handler);
      }, []);
      const hasMiniPlayer = !!nowPlayingItem && !playerFullscreenOpen;

      const isActive = tweaks.homeState === 'active';

      // ── Audit CRIT-1 · Limpiar chat efímero al finalizar sesión ──────────
      // Las conversaciones con scope='session-active' se crean al tap del
      // botón ✦ del HomeActive y se hidratan con un saludo contextualizado
      // al state de esa sesión específica (apps, tiempo, ritual, recordatorios).
      // Si NO se limpian al finalizar la sesión, en la próxima sesión el user
      // reusa la conv vieja con datos stale ("17 min restantes" cuando ya no
      // hay sesión, "4 apps bloqueadas" cuando bloqueó otras esta vez).
      // Este effect detecta el cambio active → inactive y purga las conv
      // session-active. Las conv normales (sin scope) se preservan en history.
      const wasActiveRef = React.useRef(isActive);
      React.useEffect(() => {
        if (wasActiveRef.current && !isActive) {
          // Acabamos de pasar de active → inactive
          if (typeof window !== 'undefined' && window.__mtxIAChat) {

      // ── Sub-fase 0.1 · Cableo del store __mtxActiveQueue ─────────────────

      // activa con prioridad alta. Vive aquí (NO en HomeActive) porque
      // HomeActive se desmonta al cambiar de tab, pero la sesión sigue
      // activa — la cola debe persistir entre tabs.
      const _ritualExtrasForQueue = (typeof useRitualItems === 'function')
        ? useRitualItems()
        : [];
      React.useEffect(() => {
        if (typeof window === 'undefined' || !window.__mtxActiveQueue) return;
        if (!isActive) {
          window.__mtxActiveQueue.setRitualPlaylist(null);
          return;
        }
        if (typeof window._buildRitualPlaylist !== 'function') return;
        const base = window._buildRitualPlaylist();
        if (!base) {
          window.__mtxActiveQueue.setRitualPlaylist(null);
          return;
        }
        if (Array.isArray(_ritualExtrasForQueue) && _ritualExtrasForQueue.length > 0) {
          const extraIds = _ritualExtrasForQueue
            .map(e => e.id)
            .filter(id => !base.items.includes(id));
          if (extraIds.length > 0) {
            window.__mtxActiveQueue.setRitualPlaylist({
              ...base,
              _extraItemIds: extraIds,
              totalVideos: (base.totalVideos || base.items.length) + extraIds.length,

            return;

        window.__mtxActiveQueue.setRitualPlaylist(base);

      React.useEffect(() => {

      // ── Phase 0 · Smart routing auth + onboarding ─────────────────────────

      //   'app' → renderiza el shell normal del MentexApp

      const authState = (typeof window.useAuth === 'function') ? window.useAuth() : { isAuthenticated: false, user: null };
      const initialView = (typeof window.getInitialAuthView === 'function') ? window.getInitialAuthView() : 'app';
      const [authView, setAuthView] = React.useState(initialView);
      // Pantalla de celebración post-suscripción: se activa una sola vez

        if (authState.isAuthenticated && authState.user) {
          if (!authState.user.onboardingCompleted) {
            setAuthView('onboarding');

            setAuthView('app');
          }

          // Si está en cualquier otra view auth, también dejarlo (es flow normal).
          // Solo forzar a splash si está en 'app' sin user (post-logout).
          if (authView === 'app') setAuthView('splash');

                  setTweak('homeState', 'inactive');
                  setTab('community');
                }}
                onShareExternal={() => {
                  // Por ahora un toast/log; en producción → Web Share API o screenshot.
                  if (typeof window !== 'undefined' && window.dispatchEvent) {
                    window.dispatchEvent(new CustomEvent('mtx:toast', {
                      detail: { message: 'Compartir externo · próximamente', duration: 1600 }
                    }));
                  }
                }}
                onClose={() => {
                  setCompletionOpen(false);
                  window.__mtxAppsBreak?.stop();
                  setTweak('homeState', 'inactive');
                }}/>
            )}
            {/* Mini player — position:absolute dentro de IOSDevice (position:relative)
                para que bottom:78 ancle al viewport del device, no al wrapper exterior.
                z=55 ← encima del tab bar (z=50) y por debajo de overlays (z=100+). */}
            {typeof MtxNowPlayingBar !== 'undefined' && (
              <MtxNowPlayingBar tabBarHeight={78}/>
            )}
            </ToastProvider>
          </IOSDevice>

          {/* Floating CTA — REACTIVO: aparece en cuanto el user elige un tiempo.
              Apps y rutinas son OPCIONALES — el usuario puede arrancar solo con
              un timer si así lo decide; no lo obligamos a curar redes ni rituales. */}
          {tab === 'home' && !isActive && view === 'home' &&
           !selectedChallenge && !selectedLearning && !appsEditorOpen && !routinesEditorOpen &&
           state.time > 0 && (() => {
            // Phase 5.3 — el CTA "Comenzar jornada" requiere premium (la
            // sesión sin bloqueo de apps no entrega valor real). Si free,
            // copy cambia a "Desbloquea para comenzar" y tap → premium lock.
            const isPremium = window.__mtxIsPremium ? window.__mtxIsPremium() : true;
            return (
              <button className="mtx-cta-float mtx-tap"
                      style={{
                        animation: 'mtx-cta-emerge .45s cubic-bezier(.2,.9,.3,1.2) both, mtx-breathe 3.5s ease-in-out 0.5s infinite',
                        bottom: hasMiniPlayer ? 158 : 84,
                        transition: 'bottom .35s cubic-bezier(.25,.8,.25,1)',
                      }}
                      onClick={() => {
                        if (!isPremium) {
                          if (window.__mtxOpenPremiumLock) window.__mtxOpenPremiumLock('apps');
                          return;
                        }
                        setSessionStartedAt(Date.now());
                        setTweak('homeState', 'active');
                      }}>
                {isPremium
                  ? <IcShield size={18} stroke="currentColor" strokeWidth={2}/>
                  : <IcLock size={16} stroke="currentColor" strokeWidth={2}/>}
                {isPremium
                  ? `Comenzar jornada · ${fmtTime(state.time)}`
                  : `Desbloquea para comenzar · ${fmtTime(state.time)}`}
              </button>
            );
          })()}
          <style>{`
            @keyframes mtx-cta-emerge {
              0% { transform: translateY(28px) scale(0.94); opacity: 0; }
              100% { transform: translateY(0) scale(1); opacity: 1; }
            }
          `}</style>
          {/* En sesión activa NO hay overlay flotante — el "Finalizar sesión"
              vive ahora dentro de la card del cronómetro (HomeActive) como
              acción secundaria, para que no esté invitando al usuario a
              terminar todo el tiempo. */}

          {/* Clean transparent tabbar at the very bottom. Se oculta cuando
              el flow del tab actual está en una vista interna (ver useEffect
              de sync con __mtxNav arriba). El user en una vista interna ya
              tiene su back button propio — el menú con los 5 íconos solo
              estorba a esa altura del flujo. */}
          {/* Tab bar: solo visible cuando el user está en el app real.
              Durante auth/onboarding (authView !== 'app') la barra NO debe
              aparecer — el user no se ha registrado, no puede navegar. */}
          {!tabBarHidden && authView === 'app' && (
            <div className="mtx-tabbar-clean">
              <MtxTabBar active={tab} onChange={setTab}/>
            </div>
          )}

          <CustomTimeModal
            open={!!editTimeCtx}
            onClose={() => setEditTimeCtx(null)}
            onApply={(m) => setState(s => ({ ...s, time: m }))}
            initialMinutes={editTimeCtx?.initialMinutes ?? null}
            minMinutes={editTimeCtx?.minMinutes ?? 1}
            elapsedMinutes={editTimeCtx?.elapsedMinutes ?? 0}
            // Título contextual — desde el flow de auto-rutina llega
            // "Tiempo de enfoque diario" para indicar que el valor se
            // aplica a TODOS los días de la rutina, no a una sesión.
            title={editTimeCtx?.title || 'Tiempo de enfoque'}
            // Solo desde HomeInactive (sin elapsed, sin fromAutoRoutine)
            // ofrecemos convertir a rutina automática. Casos donde NO
            // aparece el botón:
            //   • elapsedMinutes > 0 → HomeActive (ya está en sesión)
            //   • fromAutoRoutine    → ya estamos editando desde el
            //     AutoRoutineCreateSheet (evita loop)
            onConvertToAuto={
              (editTimeCtx?.elapsedMinutes ?? 0) > 0 || editTimeCtx?.fromAutoRoutine
                ? null
                : (m) => {
                    setEditTimeCtx(null);
                    // Aplica el tiempo elegido al state global ANTES de
                    // abrir el auto sheet, así el setup tile arranca con
                    // el valor correcto.
                    setState(s => ({ ...s, time: m }));
                    // setTimeout para que la animación de cierre del
                    // time modal termine antes de abrir el siguiente —
                    // evita "flash" visual de dos modales superpuestos.
                    setTimeout(() => setAutoRoutineCtx({}), 220);
                  }
            }
          />

          {typeof AutoRoutineCreateSheet !== 'undefined' && (
            <AutoRoutineCreateSheet
              open={!!autoRoutineCtx}
              onClose={() => setAutoRoutineCtx(null)}
              onCreated={(r) => {
                // En lugar del toast simple anterior, abrimos un sheet de
                // resumen que muestra los días, horario, tiempo total,
                // apps y rutinas, más una nota de que vive en
                // Configuraciones para edición/eliminación.
                setAutoRoutineCreated(r);
              }}
              // Siempre lee state.time global — si el user edita desde
              // el sub-modal, este componente re-renderiza con el nuevo
              // valor sin necesidad de propagar manualmente.
              initialMinutes={state.time || 90}
              blockedAppsIds={state.blockedApps}
              selectedRoutineIds={state.routines}
              appsCatalog={typeof APPS !== 'undefined' ? APPS : []}
              routinesCatalog={routinesCatalog}
              onEditTime={() => {
                // fromAutoRoutine flag previene que el CustomTimeModal
                // re-ofrezca la row "Convertir en rutina automática"
                // (evita loop de modales). title cambia el header para
                // indicar que el tiempo es el total diario de la rutina.
                setEditTimeCtx({
                  initialMinutes: state.time || 90,
                  fromAutoRoutine: true,
                  title: 'Tiempo de enfoque diario',
                });
              }}
              onEditApps={() => setAppsEditorOpen(true)}
              onEditRoutines={() => setRoutinesEditorOpen(true)}
            />
          )}

          {typeof AutoRoutineCreatedSheet !== 'undefined' && (
            <AutoRoutineCreatedSheet
              open={!!autoRoutineCreated}
              routine={autoRoutineCreated}
              onClose={() => setAutoRoutineCreated(null)}
              appsCatalog={typeof APPS !== 'undefined' ? APPS : []}
              routinesCatalog={routinesCatalog}
            />
          )}
          </div>

          <TweaksPanel title="Mentex Tweaks">
            {/* Dev controls para auth/onboarding — permite testear el flow
                completo (welcome → login → onboarding → app) sin tener que
                limpiar localStorage manualmente cada vez. En producción este
                section NO existirá; vive solo en el tweaks panel del dev. */}
            <TweakSection label="Auth (dev)">
              <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                <button
                  onClick={() => {
                    if (window.__mtxAuth) window.__mtxAuth._reset();
                    if (window.__mtxOnboarding) window.__mtxOnboarding._reset();
                    setAuthView('splash');
                  }}
                  style={{
                    padding: '8px 12px', borderRadius: 8,
                    border: '0.5px solid rgba(255,107,107,0.30)',
                    background: 'rgba(255,107,107,0.06)',
                    color: 'rgba(255,140,140,0.95)',
                    fontSize: 12, fontWeight: 600,
                    fontFamily: 'var(--ff-sans)',
                    cursor: 'pointer',
                    textAlign: 'left',
                  }}>↺ Reset auth → Welcome</button>
                <button
                  onClick={() => {
                    if (window.__mtxAuth) window.__mtxAuth._reset();
                    if (window.__mtxOnboarding) window.__mtxOnboarding._reset();
                    setAuthView('welcome');
                  }}
                  style={{
                    padding: '8px 12px', borderRadius: 8,
                    border: '0.5px solid rgba(255,255,255,0.10)',
                    background: 'rgba(255,255,255,0.04)',
                    color: 'var(--ink-1)',
                    fontSize: 12, fontWeight: 600,
                    fontFamily: 'var(--ff-sans)',
                    cursor: 'pointer',
                    textAlign: 'left',
                  }}>→ Welcome (skip splash)</button>
                <button
                  onClick={() => {
                    if (window.__mtxAuth) window.__mtxAuth._reset();
                    if (window.__mtxOnboarding) window.__mtxOnboarding._reset();
                    setAuthView('auth');
                  }}
                  style={{
                    padding: '8px 12px', borderRadius: 8,
                    border: '0.5px solid rgba(255,255,255,0.10)',
                    background: 'rgba(255,255,255,0.04)',
                    color: 'var(--ink-1)',
                    fontSize: 12, fontWeight: 600,
                    fontFamily: 'var(--ff-sans)',
                    cursor: 'pointer',
                    textAlign: 'left',
                  }}>→ Login screen</button>
                <button
                  onClick={() => {
                    // Acceso directo: reset onboarding + inyectar user dev
                    // sincrónico (sin signup mock async). Salto al step 1.
                    if (window.__mtxOnboarding) window.__mtxOnboarding._reset();
                    if (window.__mtxAuth && typeof window.__mtxAuth._devCreateOnboardingUser === 'function') {
                      window.__mtxAuth._devCreateOnboardingUser();
                    }
                    setAuthView('onboarding');
                  }}
                  style={{
                    padding: '8px 12px', borderRadius: 8,
                    border: '0.5px solid rgba(155,138,255,0.30)',
                    background: 'rgba(155,138,255,0.06)',
                    color: '#c4b8ff',
                    fontSize: 12, fontWeight: 600,
                    fontFamily: 'var(--ff-sans)',
                    cursor: 'pointer',
                    textAlign: 'left',
                  }}>→ Onboarding (acceso directo)</button>
                <button
                  onClick={() => {
                    if (window.__mtxAuth) window.__mtxAuth._reset();
                    if (window.__mtxOnboarding) window.__mtxOnboarding._reset();
                    // Mock returning user con onboarding ya completado
                    window.__mtxAuth.signInWithPassword('existing@mentex.app', 'password123');
                  }}
                  style={{
                    padding: '8px 12px', borderRadius: 8,
                    border: '0.5px solid rgba(61,255,209,0.30)',
                    background: 'rgba(61,255,209,0.06)',
                    color: 'var(--neon)',
                    fontSize: 12, fontWeight: 600,
                    fontFamily: 'var(--ff-sans)',
                    cursor: 'pointer',
                    textAlign: 'left',
                  }}>→ App (returning user)</button>
                {authState.user && (
                  <div style={{
                    padding: '6px 10px',
                    fontSize: 10.5, color: 'var(--ink-4)',
                    fontFamily: 'var(--ff-sans)',
                    lineHeight: 1.4,
                    background: 'rgba(255,255,255,0.02)',
                    borderRadius: 6,
                    marginTop: 4,
                  }}>
                    <div>📧 {authState.user.email}</div>
                    <div>🔑 {authState.user.provider} · onboarding: {authState.user.onboardingCompleted ? '✓' : '·'}</div>
                  </div>
                )}
              </div>
            </TweakSection>
            <TweakSection label="Estado">
              <TweakRadio label="Home" value={tweaks.homeState}
                          options={[{value:'inactive', label:'Inactivo'}, {value:'active', label:'Activo'}]}
                          onChange={(v) => setTweak('homeState', v)}/>
            </TweakSection>
            <TweakSection label="Acento">
              <TweakColor label="Color principal" value={tweaks.accentColor}
                          onChange={(v) => setTweak('accentColor', v)}/>
            </TweakSection>
            <TweakSection label="Estilo de cards">
              <TweakRadio label="Tarjetas" value={tweaks.cardStyle}
                          options={[{value:'glass',label:'Glass'},{value:'thin',label:'Líneas'},{value:'flat',label:'Plano'}]}
                          onChange={(v) => setTweak('cardStyle', v)}/>
            </TweakSection>
            <TweakSection label="Tipografía">
              <TweakRadio label="Familia" value={tweaks.fontFamily}
                          options={['Geist','Inter','Manrope']}
                          onChange={(v) => setTweak('fontFamily', v)}/>
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<MentexApp/>);
  </script>
</body>
</html>
